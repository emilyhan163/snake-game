<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameContainer {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 3px solid #333;
            border-radius: 5px;
            background: #f0f0f0;
        }

        #controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #startBtn {
            background: #4CAF50;
            color: white;
        }

        #startBtn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        #pauseBtn {
            background: #ff9800;
            color: white;
        }

        #pauseBtn:hover {
            background: #e68900;
            transform: translateY(-2px);
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
        }

        #gameOver h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        #restartBtn {
            background: #2196F3;
            color: white;
            margin-top: 20px;
        }

        #restartBtn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .instructions {
            color: white;
            margin-top: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 5px;
        }

        .instructions p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇游戏</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
            <div id="score">得分: 0</div>
        </div>
    </div>

    <div id="gameOver">
        <h2>游戏结束!</h2>
        <p id="finalScore">最终得分: 0</p>
        <button id="restartBtn">重新开始</button>
    </div>

    <div class="instructions">
        <p>🎮 使用方向键 ↑ ↓ ← → 或 WASD 控制蛇的移动</p>
        <p>🎯 吃到食物得分，蛇身会变长</p>
        <p>⚠️ 不要撞到墙壁或自己的身体</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        // Food types configuration
        const FOOD_TYPES = {
          regular: { points: 10, color: '#e74c3c', shape: 'circle' },
          bonus: { points: 25, color: '#f1c40f', shape: 'square' },
          poison: { points: 5, color: '#9b59b6', shape: 'triangle' },
          speed: { points: 15, color: '#00bcd4', shape: 'diamond' }
        };

        // Spawn weights (cumulative)
        const FOOD_WEIGHTS = [
          { type: 'regular', threshold: 0.50 },
          { type: 'bonus', threshold: 0.75 },
          { type: 'poison', threshold: 0.90 },
          { type: 'speed', threshold: 1.00 }
        ];

        const FOOD_COUNT = 3;
        const EFFECT_DURATION = 3000; // milliseconds
        const NORMAL_SPEED = 100;
        const SLOW_SPEED = 150;
        const FAST_SPEED = 60;

        // Effect state
        let foods = [];
        let effectType = null;
        let effectEndTime = 0;
        let currentSpeed = NORMAL_SPEED;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreDisplay.textContent = '得分: ' + score;
            spawnAllFoods();
            gameOverScreen.style.display = 'none';
        }

        function getRandomFoodType() {
          const rand = Math.random();
          for (const weight of FOOD_WEIGHTS) {
            if (rand < weight.threshold) {
              return weight.type;
            }
          }
          return 'regular';
        }

        function spawnSingleFood(type = null) {
          const foodType = type || getRandomFoodType();
          let attempts = 0;
          const maxAttempts = 10;

          while (attempts < maxAttempts) {
            const newFood = {
              x: Math.floor(Math.random() * tileCount),
              y: Math.floor(Math.random() * tileCount),
              type: foodType
            };

            // Check collision with snake
            let collision = false;
            for (const segment of snake) {
              if (segment.x === newFood.x && segment.y === newFood.y) {
                collision = true;
                break;
              }
            }

            // Check collision with existing foods
            if (!collision) {
              for (const food of foods) {
                if (food.x === newFood.x && food.y === newFood.y) {
                  collision = true;
                  break;
                }
              }
            }

            if (!collision) {
              return newFood;
            }
            attempts++;
          }

          // Fallback: find first available cell
          for (let y = 0; y < tileCount; y++) {
            for (let x = 0; x < tileCount; x++) {
              let occupied = false;
              for (const segment of snake) {
                if (segment.x === x && segment.y === y) {
                  occupied = true;
                  break;
                }
              }
              if (!occupied) {
                for (const food of foods) {
                  if (food.x === x && food.y === y) {
                    occupied = true;
                    break;
                  }
                }
              }
              if (!occupied) {
                return { x, y, type: foodType };
              }
            }
          }

          return null; // No space available
        }

        function spawnAllFoods() {
          foods = [];
          for (let i = 0; i < FOOD_COUNT; i++) {
            const food = spawnSingleFood();
            if (food) {
              foods.push(food);
            }
          }
        }

        function drawFood(food) {
          const config = FOOD_TYPES[food.type];
          const centerX = food.x * gridSize + gridSize / 2;
          const centerY = food.y * gridSize + gridSize / 2;
          const size = gridSize / 2 - 2;

          ctx.fillStyle = config.color;

          switch (config.shape) {
            case 'circle':
              // Regular food - circle with highlight
              ctx.beginPath();
              ctx.arc(centerX, centerY, size, 0, Math.PI * 2);
              ctx.fill();
              // Highlight
              ctx.fillStyle = shadeColor(config.color, -20);
              ctx.beginPath();
              ctx.arc(centerX - 3, centerY - 3, 3, 0, Math.PI * 2);
              ctx.fill();
              break;

            case 'square':
              // Bonus food - square with glow
              const squareSize = gridSize - 6;
              ctx.shadowColor = config.color;
              ctx.shadowBlur = 10;
              ctx.fillRect(
                food.x * gridSize + 3,
                food.y * gridSize + 3,
                squareSize,
                squareSize
              );
              ctx.shadowBlur = 0;
              // Inner highlight
              ctx.fillStyle = shadeColor(config.color, 30);
              ctx.fillRect(
                food.x * gridSize + 5,
                food.y * gridSize + 5,
                squareSize / 2,
                squareSize / 2
              );
              break;

            case 'triangle':
              // Poison food - triangle pointing down
              ctx.beginPath();
              ctx.moveTo(centerX, food.y * gridSize + gridSize - 3);
              ctx.lineTo(food.x * gridSize + 3, food.y * gridSize + 5);
              ctx.lineTo(food.x * gridSize + gridSize - 3, food.y * gridSize + 5);
              ctx.closePath();
              ctx.fill();
              // Skull indicator
              ctx.fillStyle = '#fff';
              ctx.beginPath();
              ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
              ctx.fill();
              break;

            case 'diamond':
              // Speed food - rotated square
              ctx.beginPath();
              ctx.moveTo(centerX, food.y * gridSize + 2);
              ctx.lineTo(food.x * gridSize + gridSize - 2, centerY);
              ctx.lineTo(centerX, food.y * gridSize + gridSize - 2);
              ctx.lineTo(food.x * gridSize + 2, centerY);
              ctx.closePath();
              ctx.fill();
              // Lightning bolt indicator
              ctx.fillStyle = '#fff';
              ctx.beginPath();
              ctx.moveTo(centerX, centerY - 4);
              ctx.lineTo(centerX + 2, centerY);
              ctx.lineTo(centerX - 1, centerY);
              ctx.lineTo(centerX, centerY + 4);
              ctx.lineTo(centerX - 2, centerY);
              ctx.lineTo(centerX + 1, centerY);
              ctx.closePath();
              ctx.fill();
              break;
          }
        }

        function shadeColor(color, percent) {
          const num = parseInt(color.replace('#', ''), 16);
          const amt = Math.round(2.55 * percent);
          const R = (num >> 16) + amt;
          const G = (num >> 8 & 0x00FF) + amt;
          const B = (num & 0x0000FF) + amt;
          return '#' + (0x1000000 +
            (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
            (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
            (B < 255 ? B < 1 ? 0 : B : 255)
          ).toString(16).slice(1);
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                    // 绘制眼睛
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 3,
                        segment.y * gridSize + gridSize / 3,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.arc(
                        segment.x * gridSize + gridSize * 2 / 3,
                        segment.y * gridSize + gridSize / 3,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                } else {
                    // 蛇身
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                }
            });

            // Draw all foods
            for (const food of foods) {
              drawFood(food);
            }
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 检查是否撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查是否撞到自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = '得分: ' + score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreDisplay.textContent = '最终得分: ' + score;
            gameOverScreen.style.display = 'block';
        }

        function startGame() {
            if (gameRunning) return;
            initGame();
            gameRunning = true;
            gamePaused = false;
            gameLoop = setInterval(update, 100);
            startBtn.textContent = '游戏中...';
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        function restartGame() {
            initGame();
            gameRunning = true;
            gamePaused = false;
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
            startBtn.textContent = '游戏中...';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        // 初始化画布
        initGame();
        draw();
    </script>
</body>
</html>
