<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 性能优化 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- DNS 预解析和预连接 -->
    <link rel="dns-prefetch" href="//github.com">
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#764ba2">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="贪吃蛇">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <title>贪吃蛇游戏</title>
    <style>
:root {
    --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    padding: 10px;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
}

h1 {
    color: white;
    font-size: 20px;
    margin: 10px 0;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

#gameContainer {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 360px;
}

#gameCanvas {
    display: block;
    width: 100%;
    max-width: 340px;
    height: auto;
    aspect-ratio: 1;
    margin: 0 auto;
    border: 3px solid #333;
    border-radius: 8px;
    background: #f0f0f0;
    touch-action: none;
}

#gameCanvas.effect-slow {
    border-color: #9b59b6 !important;
    box-shadow: 0 0 15px #9b59b6;
}

#gameCanvas.effect-speed {
    border-color: #00bcd4 !important;
    box-shadow: 0 0 15px #00bcd4;
}

#controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
    align-items: center;
}

button {
    padding: 10px 16px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: bold;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

#startBtn {
    background: #4CAF50;
    color: white;
}

#startBtn:active {
    background: #45a049;
    transform: scale(0.95);
}

#pauseBtn {
    background: #ff9800;
    color: white;
}

#pauseBtn:active {
    background: #e68900;
    transform: scale(0.95);
}

#score {
    font-size: 14px;
    font-weight: bold;
    color: #333;
    padding: 8px 12px;
}

#gameOver {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 30px;
    border-radius: 0;
    text-align: center;
    z-index: 1000;
}

#gameOver.show {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#gameOver h2 {
    font-size: 28px;
    margin-bottom: 15px;
}

#restartBtn {
    background: #2196F3;
    color: white;
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 16px;
}

#restartBtn:active {
    background: #0b7dda;
    transform: scale(0.95);
}

.instructions {
    display: block;
    color: white;
    text-align: center;
    margin-top: 15px;
    font-size: 11px;
    max-width: 360px;
    width: 100%;
    opacity: 0.9;
}

.instructions p {
    margin: 2px 0;
    line-height: 1.4;
}

/* 移动端显示简化版说明 */
.instructions .desktop-only {
    display: none;
}

.instructions .mobile-only {
    display: block;
}

/* Mobile Controls - Default (shown on mobile) */
.mobile-controls {
    display: grid;
    grid-template-columns: repeat(3, 55px);
    grid-template-rows: repeat(3, 55px);
    gap: 8px;
    margin-top: 15px;
    justify-content: center;
}

.control-btn {
    width: 55px;
    height: 55px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.95);
    border: 2px solid #333;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s ease;
}

.control-btn:active {
    background: rgba(200, 200, 200, 0.95);
    transform: scale(0.9);
}

.control-btn.empty {
    visibility: hidden;
}

/* Desktop Styles */
@media (min-width: 601px) {
    body {
        justify-content: center;
        padding: 20px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 20px;
    }

    #gameContainer {
        padding: 20px;
        max-width: 450px;
    }

    #gameCanvas {
        max-width: 400px;
        border-radius: 5px;
    }

    #controls {
        gap: 15px;
        margin-top: 20px;
    }

    button {
        padding: 10px 25px;
        font-size: 16px;
    }

    button:hover {
        transform: translateY(-2px);
    }

    #score {
        font-size: 20px;
    }

    .instructions {
        position: static;
        margin-top: 20px;
        padding: 15px;
        max-width: 450px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
    }

    .instructions p {
        margin: 5px 0;
        font-size: 14px;
    }

    .instructions .desktop-only {
        display: block;
    }

    .instructions .mobile-only {
        display: none;
    }

    body {
        padding-bottom: 0;
    }

    .mobile-controls {
        display: none;
    }

    #gameOver {
        position: absolute;
        padding: 40px;
        border-radius: 12px;
    }

    #gameOver h2 {
        font-size: 36px;
    }
}

/* Small phones */
@media (max-width: 360px) {
    #gameContainer {
        padding: 10px;
    }

    #gameCanvas {
        max-width: 280px;
    }

    .mobile-controls {
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(3, 48px);
        gap: 6px;
    }

    .control-btn {
        width: 48px;
        height: 48px;
        font-size: 18px;
    }

    button {
        padding: 8px 12px;
        font-size: 13px;
    }

    #score {
        font-size: 13px;
    }
}
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
            <div id="score">得分: 0</div>
        </div>
    </div>

    <div id="gameOver">
        <h2>游戏结束!</h2>
        <p id="finalScore">最终得分: 0</p>
        <button id="restartBtn">重新开始</button>
    </div>

    <!-- Mobile Controls -->
    <div class="mobile-controls" id="mobileControls">
        <div class="control-btn empty"></div>
        <div class="control-btn" id="upBtn">⬆️</div>
        <div class="control-btn empty"></div>
        <div class="control-btn" id="leftBtn">⬅️</div>
        <div class="control-btn empty"></div>
        <div class="control-btn" id="rightBtn">➡️</div>
        <div class="control-btn empty"></div>
        <div class="control-btn" id="downBtn">⬇️</div>
        <div class="control-btn empty"></div>
    </div>

    <div class="instructions">
        <p class="desktop-only">🎮 使用方向键 ↑ ↓ ← → 或 WASD 控制蛇的移动</p>
        <p class="mobile-only">📱 使用下方按钮或滑动屏幕控制 | ⭕10分 ⬜25分 🔺5分 🔷15分</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        // Food types configuration
        const FOOD_TYPES = {
          regular: { points: 10, color: '#e74c3c', shape: 'circle' },
          bonus: { points: 25, color: '#f1c40f', shape: 'square' },
          poison: { points: 5, color: '#9b59b6', shape: 'triangle' },
          speed: { points: 15, color: '#00bcd4', shape: 'diamond' }
        };

        // Spawn weights (cumulative)
        const FOOD_WEIGHTS = [
          { type: 'regular', threshold: 0.50 },
          { type: 'bonus', threshold: 0.75 },
          { type: 'poison', threshold: 0.90 },
          { type: 'speed', threshold: 1.00 }
        ];

        const FOOD_COUNT = 3;
        const EFFECT_DURATION = 3000; // milliseconds
        const NORMAL_SPEED = 150; // 从100改为150，减慢速度
        const SLOW_SPEED = 200; // 从150改为200
        const FAST_SPEED = 100; // 从60改为100

        // Effect state
        let foods = [];
        let effectType = null;
        let effectEndTime = 0;
        let currentSpeed = NORMAL_SPEED;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreDisplay.textContent = '得分: ' + score;
            spawnAllFoods();
            gameOverScreen.classList.remove('show');
            // Reset effect state
            effectType = null;
            effectEndTime = 0;
            currentSpeed = NORMAL_SPEED;
        }

        function getRandomFoodType() {
          const rand = Math.random();
          for (const weight of FOOD_WEIGHTS) {
            if (rand < weight.threshold) {
              return weight.type;
            }
          }
          return 'regular';
        }

        function spawnSingleFood(type = null) {
          const foodType = type || getRandomFoodType();
          let attempts = 0;
          const maxAttempts = 10;

          while (attempts < maxAttempts) {
            const newFood = {
              x: Math.floor(Math.random() * tileCount),
              y: Math.floor(Math.random() * tileCount),
              type: foodType
            };

            // Check collision with snake
            let collision = false;
            for (const segment of snake) {
              if (segment.x === newFood.x && segment.y === newFood.y) {
                collision = true;
                break;
              }
            }

            // Check collision with existing foods
            if (!collision) {
              for (const food of foods) {
                if (food.x === newFood.x && food.y === newFood.y) {
                  collision = true;
                  break;
                }
              }
            }

            if (!collision) {
              return newFood;
            }
            attempts++;
          }

          // Fallback: find first available cell
          for (let y = 0; y < tileCount; y++) {
            for (let x = 0; x < tileCount; x++) {
              let occupied = false;
              for (const segment of snake) {
                if (segment.x === x && segment.y === y) {
                  occupied = true;
                  break;
                }
              }
              if (!occupied) {
                for (const food of foods) {
                  if (food.x === x && food.y === y) {
                    occupied = true;
                    break;
                  }
                }
              }
              if (!occupied) {
                return { x, y, type: foodType };
              }
            }
          }

          return null; // No space available
        }

        function spawnAllFoods() {
          foods = [];
          for (let i = 0; i < FOOD_COUNT; i++) {
            const food = spawnSingleFood();
            if (food) {
              foods.push(food);
            }
          }
        }

        function drawFood(food) {
          const config = FOOD_TYPES[food.type];
          const centerX = food.x * gridSize + gridSize / 2;
          const centerY = food.y * gridSize + gridSize / 2;
          const size = gridSize / 2 - 2;

          ctx.fillStyle = config.color;

          switch (config.shape) {
            case 'circle':
              // Regular food - circle with highlight
              ctx.beginPath();
              ctx.arc(centerX, centerY, size, 0, Math.PI * 2);
              ctx.fill();
              // Highlight
              ctx.fillStyle = shadeColor(config.color, -20);
              ctx.beginPath();
              ctx.arc(centerX - 3, centerY - 3, 3, 0, Math.PI * 2);
              ctx.fill();
              break;

            case 'square':
              // Bonus food - square with glow
              const squareSize = gridSize - 6;
              ctx.shadowColor = config.color;
              ctx.shadowBlur = 10;
              ctx.fillRect(
                food.x * gridSize + 3,
                food.y * gridSize + 3,
                squareSize,
                squareSize
              );
              ctx.shadowBlur = 0;
              // Inner highlight
              ctx.fillStyle = shadeColor(config.color, 30);
              ctx.fillRect(
                food.x * gridSize + 5,
                food.y * gridSize + 5,
                squareSize / 2,
                squareSize / 2
              );
              break;

            case 'triangle':
              // Poison food - triangle pointing down
              ctx.beginPath();
              ctx.moveTo(centerX, food.y * gridSize + gridSize - 3);
              ctx.lineTo(food.x * gridSize + 3, food.y * gridSize + 5);
              ctx.lineTo(food.x * gridSize + gridSize - 3, food.y * gridSize + 5);
              ctx.closePath();
              ctx.fill();
              // Skull indicator
              ctx.fillStyle = '#fff';
              ctx.beginPath();
              ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
              ctx.fill();
              break;

            case 'diamond':
              // Speed food - rotated square
              ctx.beginPath();
              ctx.moveTo(centerX, food.y * gridSize + 2);
              ctx.lineTo(food.x * gridSize + gridSize - 2, centerY);
              ctx.lineTo(centerX, food.y * gridSize + gridSize - 2);
              ctx.lineTo(food.x * gridSize + 2, centerY);
              ctx.closePath();
              ctx.fill();
              // Lightning bolt indicator
              ctx.fillStyle = '#fff';
              ctx.beginPath();
              ctx.moveTo(centerX, centerY - 4);
              ctx.lineTo(centerX + 2, centerY);
              ctx.lineTo(centerX - 1, centerY);
              ctx.lineTo(centerX, centerY + 4);
              ctx.lineTo(centerX - 2, centerY);
              ctx.lineTo(centerX + 1, centerY);
              ctx.closePath();
              ctx.fill();
              break;
          }
        }

        function shadeColor(color, percent) {
          const num = parseInt(color.replace('#', ''), 16);
          const amt = Math.round(2.55 * percent);
          const R = (num >> 16) + amt;
          const G = (num >> 8 & 0x00FF) + amt;
          const B = (num & 0x0000FF) + amt;
          return '#' + (0x1000000 +
            (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
            (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
            (B < 255 ? B < 1 ? 0 : B : 255)
          ).toString(16).slice(1);
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update canvas border for effects
            canvas.classList.remove('effect-slow', 'effect-speed');
            if (effectType === 'slow') {
              canvas.classList.add('effect-slow');
            } else if (effectType === 'speed') {
              canvas.classList.add('effect-speed');
            }

            // 绘制网格
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                    // 绘制眼睛
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 3,
                        segment.y * gridSize + gridSize / 3,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.arc(
                        segment.x * gridSize + gridSize * 2 / 3,
                        segment.y * gridSize + gridSize / 3,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                } else {
                    // 蛇身
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                }
            });

            // Draw all foods
            for (const food of foods) {
              drawFood(food);
            }
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            // Check if effect has expired
            if (effectType && Date.now() > effectEndTime) {
              effectType = null;
              updateGameSpeed(NORMAL_SPEED);
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 检查是否撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查是否撞到自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collisions
            let eatenFoodIndex = -1;
            for (let i = 0; i < foods.length; i++) {
              if (head.x === foods[i].x && head.y === foods[i].y) {
                eatenFoodIndex = i;
                break;
              }
            }

            if (eatenFoodIndex !== -1) {
              const eatenFood = foods[eatenFoodIndex];
              const config = FOOD_TYPES[eatenFood.type];

              // Add points
              score += config.points;
              scoreDisplay.textContent = '得分: ' + score;

              // Apply effects for poison and speed
              if (eatenFood.type === 'poison') {
                effectType = 'slow';
                effectEndTime = Date.now() + EFFECT_DURATION;
                updateGameSpeed(SLOW_SPEED);
              } else if (eatenFood.type === 'speed') {
                effectType = 'speed';
                effectEndTime = Date.now() + EFFECT_DURATION;
                updateGameSpeed(FAST_SPEED);
              }

              // Remove eaten food and spawn new one
              foods.splice(eatenFoodIndex, 1);
              const newFood = spawnSingleFood();
              if (newFood) {
                foods.push(newFood);
              }
            } else {
              snake.pop();
            }

            draw();
        }

        function gameOver() {
            releaseWakeLock();
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreDisplay.textContent = '最终得分: ' + score;
            gameOverScreen.classList.add('show');
        }

        function startGame() {
            if (gameRunning) return;
            initGame();
            gameRunning = true;
            gamePaused = false;
            gameLoop = setInterval(update, NORMAL_SPEED); // 使用 NORMAL_SPEED
            startBtn.textContent = '游戏中...';
            requestWakeLock();
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
            if (gamePaused) {
                releaseWakeLock();
            } else {
                requestWakeLock();
            }
        }

        function updateGameSpeed(newSpeed) {
          currentSpeed = newSpeed;
          clearInterval(gameLoop);
          gameLoop = setInterval(update, currentSpeed);
        }

        function restartGame() {
            initGame();
            gameRunning = true;
            gamePaused = false;
            clearInterval(gameLoop);
            gameLoop = setInterval(update, NORMAL_SPEED); // 使用 NORMAL_SPEED
            startBtn.textContent = '游戏中...';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        // 移动端控制按钮
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        function handleDirectionChange(newDx, newDy) {
            if (!gameRunning || gamePaused) return;
            
            if (newDx === 0 && newDy === -1 && dy !== 1) {
                dx = 0;
                dy = -1;
            } else if (newDx === 0 && newDy === 1 && dy !== -1) {
                dx = 0;
                dy = 1;
            } else if (newDx === -1 && newDy === 0 && dx !== 1) {
                dx = -1;
                dy = 0;
            } else if (newDx === 1 && newDy === 0 && dx !== -1) {
                dx = 1;
                dy = 0;
            }
        }

        upBtn.addEventListener('click', () => handleDirectionChange(0, -1));
        downBtn.addEventListener('click', () => handleDirectionChange(0, 1));
        leftBtn.addEventListener('click', () => handleDirectionChange(-1, 0));
        rightBtn.addEventListener('click', () => handleDirectionChange(1, 0));

        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        const minSwipeDistance = 30;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) < minSwipeDistance && Math.abs(deltaY) < minSwipeDistance) {
                return;
            }

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (deltaX > 0) {
                    handleDirectionChange(1, 0); // 右
                } else {
                    handleDirectionChange(-1, 0); // 左
                }
            } else {
                // 垂直滑动
                if (deltaY > 0) {
                    handleDirectionChange(0, 1); // 下
                } else {
                    handleDirectionChange(0, -1); // 上
                }
            }
        }, { passive: true });

        // Wake Lock API - keep screen on during gameplay
        let wakeLock = null;

        async function requestWakeLock() {
            if ('wakeLock' in navigator && gameRunning && !gamePaused) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('Wake Lock error:', err);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // Handle visibility change for wake lock
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && wakeLock) {
                releaseWakeLock();
            } else if (!document.hidden && gameRunning && !gamePaused) {
                requestWakeLock();
            }
        });

        // Tap canvas to start game
        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                startGame();
            }
        });

        // Prevent context menu on long press for mobile
        document.addEventListener('contextmenu', (e) => {
            if (window.innerWidth <= 600) {
                e.preventDefault();
            }
        });

        // 初始化画布
        initGame();
        draw();

        // Register Service Worker immediately (don't wait for load)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('Service Worker registered:', registration.scope);
                    // Force update
                    registration.update();
                })
                .catch((error) => {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
